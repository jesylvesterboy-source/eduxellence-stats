<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Eduxellence Analytics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F7F9FC;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(11, 24, 41, 0.1);
            width: 400px;
            max-width: 90%;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #0B1829;
            font-size: 24px;
            font-weight: 700;
        }
        .logo span {
            color: #1E6BFF;
        }
        .logo p {
            color: #64748B;
            font-size: 14px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #0F172A;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E2E8F0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1E6BFF;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #1E6BFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #0047CC;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .switch {
            text-align: center;
            margin-top: 16px;
            color: #64748B;
            font-size: 14px;
        }
        .switch a {
            color: #1E6BFF;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .switch a:hover {
            text-decoration: underline;
        }
        .error {
            background: #FEE2E2;
            color: #DC2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .success {
            background: #D1FAE5;
            color: #065F46;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .note {
            background: #FEF3C7;
            color: #92400E;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            border-left: 4px solid #D97706;
        }
        .note code {
            background: #FFFBEB;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Eduxellence <span>Analytics</span></h1>
            <p>Statistical Analysis Platform</p>
        </div>

        <div id="error" class="error"></div>
        <div id="success" class="success"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6" />
            </div>
            <button type="submit" class="btn" id="loginBtn">Sign In</button>
        </form>

        <div class="switch">
            Don't have an account? <a onclick="switchMode('signup')">Create one</a>
        </div>

        <!-- Signup Form (hidden) -->
        <form id="signupForm" style="display:none;">
            <div class="form-group">
                <label for="signupEmail">Email Address</label>
                <input type="email" id="signupEmail" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
                <label for="signupPassword">Password (min 6 characters)</label>
                <input type="password" id="signupPassword" placeholder="••••••••" required minlength="6" />
            </div>
            <button type="submit" class="btn" id="signupBtn">Create Account</button>
        </form>

        <div id="signupSwitch" class="switch" style="display:none;">
            Already have an account? <a onclick="switchMode('login')">Sign in</a>
        </div>

        <div class="note">
            🔧 <strong>Dev Mode:</strong> Use any email/password. 
            <br />No email confirmation required. 
            <br />After signing in, return to <a href="/stats" style="color:#1E6BFF;">Stats Tool</a>
        </div>
    </div>

    <script>
        let mode = 'login';

        function switchMode(newMode) {
            mode = newMode;
            if (newMode === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('signupForm').style.display = 'none';
                document.querySelector('.switch').style.display = 'block';
                document.getElementById('signupSwitch').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('signupForm').style.display = 'block';
                document.querySelector('.switch').style.display = 'none';
                document.getElementById('signupSwitch').style.display = 'block';
            }
            hideMessages();
        }

        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    showSuccess('✅ Successfully signed in! Redirecting...');
                    // Store token
                    localStorage.setItem('supabase_token', data.token);
                    document.cookie = `supabase_token=${data.token}; path=/`;
                    setTimeout(() => {
                        window.location.href = '/stats';
                    }, 1500);
                } else {
                    if (data.error === 'Invalid email or password' || data.error === 'Invalid login credentials') {
                        showError('❌ Invalid email or password. Please try again.');
                    } else {
                        showError('❌ ' + (data.error || 'Login failed. Please try again.'));
                    }
                }
            } catch (err) {
                showError('❌ Network error. Please check your connection.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        // Signup
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            if (password.length < 6) {
                showError('❌ Password must be at least 6 characters.');
                btn.disabled = false;
                btn.textContent = 'Create Account';
                return;
            }

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    showSuccess('✅ Account created! Signing you in...');
                    if (data.token) {
                        localStorage.setItem('supabase_token', data.token);
                        document.cookie = `supabase_token=${data.token}; path=/`;
                    }
                    setTimeout(() => {
                        window.location.href = '/stats';
                    }, 1500);
                } else {
                    showError('❌ ' + (data.error || 'Signup failed. Please try again.'));
                }
            } catch (err) {
                showError('❌ Network error. Please check your connection.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
